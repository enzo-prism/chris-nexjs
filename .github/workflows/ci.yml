name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Type and contract checks
        run: |
          pnpm run check
          pnpm run test:api
          pnpm run test:routes
          pnpm run test:seo
          pnpm run test:design-system

      - name: Build app for runtime audits
        run: pnpm run build

      - name: Runtime SEO and image audits
        run: |
          pnpm exec next start -p 3200 &
          SERVER_PID=$!
          cleanup() {
            kill $SERVER_PID >/dev/null 2>&1 || true
            wait $SERVER_PID >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          sleep 8
          IMAGE_AUDIT_BASE_URL=http://localhost:3200 pnpm run test:images
          SEO_AUDIT_BASE_URL=http://localhost:3200 pnpm run test:seo:onpage
          SEO_AUDIT_BASE_URL=http://localhost:3200 pnpm run test:seo:links
          SEO_AUDIT_BASE_URL=http://localhost:3200 pnpm run test:seo:schema

  perf:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build perf dist
        run: pnpm run build:perf

      - name: Bundle budget gate
        run: NEXT_DIST_DIR=.next-perf pnpm run test:bundle

      - name: Run perf smoke + lighthouse
        run: |
          NEXT_DIST_DIR=.next-perf pnpm exec next start -p 3101 &
          SERVER_PID=$!
          cleanup() {
            kill $SERVER_PID >/dev/null 2>&1 || true
            wait $SERVER_PID >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          sleep 8
          PERF_BASE_URL=http://localhost:3101 pnpm run perf:smoke
          LIGHTHOUSE_BASE_URL=http://localhost:3101 LIGHTHOUSE_RUNS=1 pnpm run perf:lighthouse
